function startQuiz(category, difficulty) {
  difficulty = difficulty || 'normal';
  let pool = category === 'all' ? DATA.filter(d => QUIZ_CATS.has(d.category)) : DATA.filter(d => d.category === category);
  const qCount = QUIZ_COUNT[difficulty] || 5;
  pool = shuffle(pool).slice(0, qCount);

  const questions = pool.map((item, i) => {
    if (category === 'tool' || item.category === 'tool') {
      // Tool quiz: name (image→name) and image (name→image) types only
      if (difficulty === 'easy') {
        return { type: 'name', item: item };
      } else if (difficulty === 'hard') {
        const types = ['name', 'image', 'name', 'image', 'name', 'image', 'name'];
        return types[i % types.length] === 'image'
          ? { type: 'image', item: item }
          : { type: 'name', item: item };
      } else {
        const types = ['name', 'image', 'name', 'image', 'name'];
        return types[i % types.length] === 'image'
          ? { type: 'image', item: item }
          : { type: 'name', item: item };
      }
    } else if (difficulty === 'easy') {
      // Easy: image+hint → guess season
      return { type: 'season', item: item, showHint: true };
    } else if (difficulty === 'hard') {
      // Hard: odd-one-out, reverse, season, nakamawake (all picture-based)
      const types = ['oddone', 'reverse', 'season', 'oddone', 'reverse', 'season', 'oddone'];
      const t = types[i % types.length];
      if (t === 'oddone') return { type: 'oddone', item: item };
      if (t === 'reverse') return { type: 'reverse', season: item.season, correctItem: item, category: item.category };
      return { type: 'season', item: item };
    } else {
      // Normal: season, oddone, reverse, season, oddone
      const types = ['season', 'oddone', 'reverse', 'season', 'oddone'];
      const t = types[i % types.length];
      if (t === 'oddone') return { type: 'oddone', item: item };
      if (t === 'reverse') return { type: 'reverse', season: item.season, correctItem: item, category: item.category };
      return { type: 'season', item: item };
    }
  });

  quizState = {
    questions: questions,
    current: 0,
    score: 0,
    answers: [],
    category: category,
    difficulty: difficulty,
    streak: 0,
    maxStreak: 0,
  };

  const catNames = { flower: "はな", insect: "むし", event: "ぎょうじ", food: "やさい・くだもの", tool: "どうぐ", all: "ぜんぶ" };
  const diffNames = { easy: "かんたん", normal: "ふつう", hard: "むずかしい" };
  document.getElementById('quiz-header-title').textContent = catNames[category] + " " + diffNames[difficulty];

  // Preload all images that might appear in this quiz (including distractors)
  const quizPool = category === 'all' ? DATA.filter(d => QUIZ_CATS.has(d.category)) : DATA.filter(d => d.category === category);
  preloadImages(quizPool.map(d => d.name));

  showScreen('quiz');
  Audio.startBGM('quiz');
  spawnSeasonDeco(quizState);
  renderQuizQuestion();
}

// ===== SEASONAL BACKGROUND DECORATION =====
function spawnSeasonDeco(qs) {
  document.querySelectorAll('.quiz-season-deco').forEach(e => e.remove());
  const quizArea = document.getElementById('quiz-area');
  if (quizArea) quizArea.style.background = '';
  if (qs && qs.isFinalTest) return;
  let season = null;
  if (qs && qs.questions && qs.questions[0]) {
    const q = qs.questions[0];
    const item = q.item || q.correctItem;
    if (item) season = item.season;
  }
  if (!season) return;
  const particles = {
    spring: ['🌸', '🌼', '🌿', '🍃', '🌷'],
    summer: ['☀️', '🌊', '🐚', '🌻', '💧'],
    autumn: ['🍂', '🍁', '🍄', '🌾', '🎃'],
    winter: ['❄️', '⛄', '✨', '🌨️', '💎'],
  };
  const seasonBgs = {
    spring: 'linear-gradient(180deg, #fff0f3 0%, #fce4ec 100%)',
    summer: 'linear-gradient(180deg, #e0f7fa 0%, #b3e5fc 100%)',
    autumn: 'linear-gradient(180deg, #fff8e1 0%, #ffe0b2 100%)',
    winter: 'linear-gradient(180deg, #e8eaf6 0%, #c5cae9 100%)',
  };
  if (quizArea) quizArea.style.background = seasonBgs[season] || '';
  const deco = document.createElement('div');
  deco.className = 'quiz-season-deco';
  const pool = particles[season] || particles.spring;
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'quiz-season-particle';
    p.textContent = pool[i % pool.length];
    p.style.left = (Math.random() * 100) + '%';
    p.style.animationDuration = (6 + Math.random() * 8) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.fontSize = (0.8 + Math.random() * 0.8) + 'rem';
    deco.appendChild(p);
  }
  document.getElementById('screen-quiz').appendChild(deco);
}

function getCatLabel(cat) {
  return { flower: "はな は…", insect: "むし は…", event: "ぎょうじ は…", food: "やさい・くだもの は…", tool: "どうぐ は…" }[cat] || "";
}

let quizLocked = false;
function answerQuiz(btn, correct) {
  if (quizLocked) return;
  quizLocked = true;

  const options = document.getElementById('quiz-options');
  const q = quizState.questions[quizState.current];

  if (correct) {
    btn.classList.add('correct');
    Audio.sfx('correct');
    quizState.score++;
    quizState.streak++;
    if (quizState.streak > quizState.maxStreak) quizState.maxStreak = quizState.streak;
    document.getElementById('quiz-score-display').innerHTML = `${ic('star','ms-star')} ${quizState.score}`;

    // Add to collection
    const itemName = (q.type === 'reverse') ? q.correctItem.name : (q.item ? q.item.name : null);
    if (!collectedItems.includes(itemName)) {
      collectedItems.push(itemName);
      localStorage.setItem('juken_collected', JSON.stringify(collectedItems));
    }

    if (quizState.streak >= 3) {
      showToast(`すごい！ ${quizState.streak}れんぞく！`);
    } else {
      showToast("せいかい！");
    }
  } else {
    btn.classList.add('wrong');
    Audio.sfx('wrong');
    quizState.streak = 0;
    options.querySelectorAll('[data-correct="true"]').forEach(b => b.classList.add('correct'));
    showToast("おしい！");
  }

  quizState.answers.push(correct);

  // Track per-category accuracy
  const qItem = q.type === 'reverse' ? q.correctItem : q.item;
  if (qItem) updateCatStat(qItem.category, correct);

  // Reveal item names after answering (oddone, reverse, nakamawake buttons have data-name)
  if (q.type === 'oddone' || q.type === 'reverse' || q.type === 'image') {
    options.querySelectorAll('[data-name]').forEach(b => {
      const nameEl = document.createElement('span');
      nameEl.className = 'opt-name-reveal';
      nameEl.textContent = b.dataset.name;
      b.appendChild(nameEl);
    });
  }
  // For season/name quiz: show the item name on the question card
  if ((q.type === 'season' || q.type === 'name') && q.item) {
    const card = document.querySelector('.quiz-question-card');
    if (card && !card.querySelector('.opt-name-reveal')) {
      const nameEl = document.createElement('div');
      nameEl.className = 'opt-name-reveal';
      nameEl.textContent = q.item.name;
      nameEl.style.marginTop = '8px';
      card.appendChild(nameEl);
    }
  }

  setTimeout(() => {
    quizLocked = false;
    quizState.current++;
    if (quizState.current >= quizState.questions.length) {
      showQuizResult();
    } else {
      renderQuizQuestion();
    }
  }, correct ? 1000 : 2000);
}

function showQuizResult() {
  const score = quizState.score;
  const total = quizState.questions.length;
  const pct = Math.round((score / total) * 100);

  // 1 correct = 1 star + accuracy bonus + combo bonus
  let earnedStars = score; // 正解数 = そのまま星
  let accuracyBonus = 0;
  let emoji, title, message;

  if (pct === 100) {
    accuracyBonus = 3;
    earnedStars += accuracyBonus;
    emoji = ic('emoji_events', 'ms-xxxl ms-star');
    title = "かんぺき！！";
    message = `ぜんもん せいかい！ボーナス +${accuracyBonus}${ic('star','ms-star')}`;
  } else if (pct >= 80) {
    accuracyBonus = 1;
    earnedStars += accuracyBonus;
    emoji = ic('celebration', 'ms-xxxl');
    title = "すばらしい！";
    message = `${score}もん せいかい！ボーナス +${accuracyBonus}${ic('star','ms-star')}`;
  } else if (pct >= 60) {
    emoji = ic('celebration', 'ms-xxxl');
    title = "よく できました！";
    message = `${score}もん せいかい！がんばったね！`;
  } else if (score > 0) {
    emoji = ic('sentiment_satisfied', 'ms-xxxl');
    title = "がんばったね！";
    message = `${score}もん せいかい！つぎは もっと いけるよ！`;
  } else {
    emoji = ic('fitness_center', 'ms-xxxl');
    title = "つぎは がんばろう！";
    message = "ずかん で おぼえてから もういちど やってみよう！";
  }

  // Difficulty multiplier: hard → double stars (applied FIRST)
  const difficulty = quizState.difficulty || 'normal';
  let diffBonus = 0;
  if (difficulty === 'hard' && earnedStars > 0) {
    diffBonus = earnedStars; // double
    earnedStars *= 2;
  }

  // Combo bonus: scaled by streak length
  let comboBonus = 0;
  if (quizState.maxStreak >= 5) {
    comboBonus = 2;
    earnedStars += 2;
  } else if (quizState.maxStreak >= 3) {
    comboBonus = 1;
    earnedStars += 1;
  }

  // Daily challenge bonus
  let dailyBonus = 0;
  if (quizState.isDaily && !isDailyDone()) {
    dailyBonus = completeDailyChallenge(earnedStars);
    earnedStars += dailyBonus;
  }

  // Mission system (staged bonuses)
  const missionBonus = recordGameType(quizState.isFinalTest ? 'final' : 'quiz');
  earnedStars += missionBonus;

  const prevStars = totalStars;
  totalStars += earnedStars;
  localStorage.setItem('juken_stars', totalStars.toString());

  // Check for new badge
  const prevBadge = (() => { let b = null; for (const x of BADGES) { if (prevStars >= x.stars) b = x; } return b; })();
  const newBadge = getCurrentBadge();
  const badgeUnlocked = newBadge && (!prevBadge || newBadge.stars > prevBadge.stars);

  // Feed egg with earned stars
  const eggResult = feedEggStars(earnedStars);
  if (eggResult.hatched) {
    pendingEvolution = true;
    setTimeout(() => showHatchAnimation(eggResult.creature, eggResult.isNew, eggResult.overflow || 0), 500);
  }

  quizHistory.push({
    date: new Date().toISOString(),
    category: quizState.category,
    difficulty: difficulty,
    score: score,
    total: total,
    stars: earnedStars,
    isDaily: quizState.isDaily || false,
  });
  localStorage.setItem('juken_history', JSON.stringify(quizHistory.slice(-50)));

  // Collection progress
  const totalItems = DATA.length;
  const collected = collectedItems.length;

  const diffNames = { easy: "かんたん", normal: "ふつう", hard: "むずかしい" };
  let bonusHTML = '';
  if (accuracyBonus > 0) bonusHTML += `<div class="combo-bonus">${ic('emoji_events','')} ${pct === 100 ? 'かんぺき' : 'せいかいりつ'}ボーナス +${accuracyBonus}${ic('star','ms-star')}</div>`;
  if (dailyBonus > 0) bonusHTML += `<div class="combo-bonus">${ic('today','')} デイリーボーナス +${dailyBonus}${ic('star','ms-star')}${getDailyStreak() >= 3 ? '（' + getDailyStreak() + 'にち れんぞく！）' : ''}</div>`;
  if (comboBonus > 0) bonusHTML += `<div class="combo-bonus">${ic('local_fire_department','ms-fire')} コンボボーナス +${comboBonus}${ic('star','ms-star')}</div>`;
  if (diffBonus > 0) bonusHTML += `<div class="combo-bonus">${ic('diamond','')} むずかしいボーナス ×2</div>`;
  if (missionBonus >= MISSION_STAGE2_BONUS) bonusHTML += `<div class="combo-bonus">🏆 ミッション ぜんぶクリア！ +${missionBonus}${ic('star','ms-star')}</div>`;
  else if (missionBonus > 0) bonusHTML += `<div class="combo-bonus">🎯 ミッション ${MISSION_STAGE1_COUNT}つクリア！ +${missionBonus}${ic('star','ms-star')}</div>`;
  const badgeHTML = badgeUnlocked ? `<div style="background:#fff8e1;border:2px solid #ffd700;border-radius:16px;padding:16px;margin-bottom:16px;text-align:center;"><div style="font-size:2rem;">${newBadge.emoji}</div><div style="font-weight:800;font-size:1.1rem;margin-top:4px;">しょうごう ゲット！</div><div style="font-size:1.2rem;font-weight:700;color:#f57f17;">${newBadge.title}</div></div>` : '';
  const evoHTML = eggResult.hatched ? `<div style="background:linear-gradient(135deg,#e8f5e9,#fff8e1);border:2px solid #8bc34a;border-radius:16px;padding:16px;margin-bottom:16px;text-align:center;"><div style="font-weight:800;font-size:0.9rem;color:#558b2f;margin-bottom:8px;">🥚 たまご が かえった！</div><div style="width:80px;height:80px;margin:8px auto;">${creatureSVG(eggResult.creature.key)}</div><div style="font-weight:800;color:${RARITY_INFO[eggResult.creature.rarity].color}">${RARITY_INFO[eggResult.creature.rarity].stars} ${eggResult.creature.label}</div>${eggResult.isNew ? '<div style="color:#ffd700;font-weight:700;margin-top:4px;">NEW!</div>' : ''}</div>` : '';

  const area = document.getElementById('quiz-area');
  area.innerHTML = `
    <div class="quiz-result">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${title}</div>
      <div class="result-score">${score} / ${total}</div>
      <div class="result-label">もん せいかい（${quizState.isFinalTest ? 'さいしゅうテスト' : quizState.isMix ? 'なんでもクイズ' : diffNames[difficulty]}）</div>
      ${bonusHTML}
      <div class="result-stars">${earnedStars > 0 ? ic('star','ms-star').repeat(Math.min(earnedStars, 10)) + ' ゲット！' : ''}</div>
      ${evoHTML}
      ${badgeHTML}
      <div class="result-message">${message}</div>
      <div style="background:#f0f0f0;border-radius:12px;padding:12px;margin-bottom:20px;font-size:0.9rem;">

function retryWrongAnswers() {
  if (!quizState) return;
  const wrongQuestions = quizState.questions.filter((q, i) => !quizState.answers[i]);

  quizState = {
    questions: wrongQuestions, current: 0, score: 0, answers: [],
    category: quizState.category, difficulty: quizState.difficulty,
    streak: 0, maxStreak: 0,
    isMix: quizState.isMix, isFinalTest: quizState.isFinalTest, isRetry: true,
  };
  document.getElementById('quiz-header-title').textContent = 'ふくしゅう';
  Audio.startBGM('quiz');
  renderQuizQuestion();
}

function confirmQuitQuiz() {
  if (quizState && quizState.current > 0 && quizState.current < quizState.questions.length) {
    showModal('クイズを やめる？', () => (quizState.isMix || quizState.isFinalTest) ? showMenu() : showQuizSelect());
    return;
  }
  if (quizState && (quizState.isMix || quizState.isFinalTest)) { showMenu(); return; }
  showQuizSelect();
}

function flipFC() {

function fcPrev() {

function fcNext() {
  if (fcState.index < fcState.items.length - 1) { fcState.index++; fcState.flipped = false; renderFlashCard(); }

function fcShuffle() {
  fcState.items = shuffle(fcState.items);

// ===== SHIRITORI =====
let shiriState = null;
let shiriLocked = false;

function shiritoriLastChar(name) {
  let s = '';
  for (const ch of name) {
    const cp = ch.codePointAt(0);
    s += (cp >= 0x30A1 && cp <= 0x30F6) ? String.fromCodePoint(cp - 0x60) : ch;
  }
  let last = s[s.length - 1];
  const sm = {'ぁ':'あ','ぃ':'い','ぅ':'う','ぇ':'え','ぉ':'お','っ':'つ','ゃ':'や','ゅ':'ゆ','ょ':'よ'};
  return sm[last] || last;
}

function shiritoriFirstChar(name) {
  const ch = name[0];
  const cp = ch.codePointAt(0);
  return (cp >= 0x30A1 && cp <= 0x30F6) ? String.fromCodePoint(cp - 0x60) : ch;
}

function getShiritoriStarters(exclude) {
  return DATA.filter(d => {
    if (exclude && exclude.has(d.name)) return false;
    const last = shiritoriLastChar(d.name);
    if (last === 'ん') return false;
    return DATA.some(o => o.name !== d.name && shiritoriFirstChar(o.name) === last && shiritoriLastChar(o.name) !== 'ん');
  });
}

function startShiritori() {
  Audio.ensureCtx();
  Audio.startBGM('quiz');
  const starters = getShiritoriStarters();
  const start = shuffle(starters)[0];
  shiriState = {
    chain: [start], round: 1, totalRounds: 3,
    correctSteps: 0, totalSteps: 0,
    allChains: [], usedStarters: new Set([start.name]),
    correctItem: null,
  };
  // Preload all images for shiritori
  preloadImages(DATA.map(d => d.name));
  showScreen('shiritori');
  renderShiritori();
}

function renderShiritori() {
  const container = document.getElementById('shiritori-container');
  const lastItem = shiriState.chain[shiriState.chain.length - 1];
  const lastChar = shiritoriLastChar(lastItem.name);

  const usedNames = new Set(shiriState.chain.map(c => c.name));
  const validNext = DATA.filter(d => !usedNames.has(d.name) && shiritoriFirstChar(d.name) === lastChar && shiritoriLastChar(d.name) !== 'ん');

  if (shiriState.chain.length >= 4 || validNext.length === 0) {
    finishShiritoriRound();
    return;
  }

  const correct = shuffle(validNext)[0];
  shiriState.correctItem = correct;

  const wrongPool = DATA.filter(d => !usedNames.has(d.name) && shiritoriFirstChar(d.name) !== lastChar);
  const wrongs = shuffle(wrongPool).slice(0, 2);
  const options = shuffle([correct, ...wrongs]);

  const noAlt = s => s.replace(/alt="[^"]*"/, 'alt=""');
  let chainHTML = '<div class="shiri-chain">';
  shiriState.chain.forEach((item, i) => {
    if (i > 0) chainHTML += '<span class="shiri-arrow">→</span>';
    const lc = shiritoriLastChar(item.name);
    chainHTML += `<div class="shiri-chain-item">
      <div>${noAlt(getIcon(item.name, 'color'))}</div>
      ${i > 0 ? `<div class="shiri-chain-char">…${lc}</div>` : ''}
    </div>`;
  });
  chainHTML += '<span class="shiri-arrow">→</span><div class="shiri-blank">？</div></div>';

  container.innerHTML = `

// ===== SHIRITORI ORDER (並べ替え) =====
let shiriOrdState = null;
let shiriOrdLocked = false;

function buildShiriChain(length, exclude) {
  // Build a valid shiritori chain of given length from DATA
  // Try requested length first, then fall back to length-1 (min 3)
  for (let targetLen = length; targetLen >= 3; targetLen--) {
    for (let t = 0; t < 300; t++) {
      const pool = DATA.filter(d => {
        if (exclude && exclude.has(d.name)) return false;
        return shiritoriLastChar(d.name) !== 'ん';
      });
      const start = shuffle(pool)[0];
      if (!start) continue;
      const chain = [start];
      const used = new Set([start.name]);
      for (let i = 1; i < targetLen; i++) {
        const lastChar = shiritoriLastChar(chain[chain.length - 1].name);
        const candidates = DATA.filter(d => !used.has(d.name) && !(exclude && exclude.has(d.name)) && shiritoriFirstChar(d.name) === lastChar && shiritoriLastChar(d.name) !== 'ん');
        if (candidates.length === 0) break;
        const next = shuffle(candidates)[0];
        chain.push(next);
        used.add(next.name);
      }
      if (chain.length === targetLen) return chain;
    }
  }
  return null;
}

function startShiriOrder() {
  Audio.ensureCtx();
  Audio.startBGM('quiz');
  shiriOrdState = {
    round: 1, totalRounds: 3, chainLength: 4,
    correctRounds: 0, totalTaps: 0, correctTaps: 0,
    allChains: [], usedNames: new Set(),
  };
  setupShiriOrderRound();
  showScreen('shiriorder');
}

function setupShiriOrderRound() {
  const chain = buildShiriChain(shiriOrdState.chainLength, shiriOrdState.usedNames);
  if (!chain) { showShiriOrderResult(); return; }
  chain.forEach(item => shiriOrdState.usedNames.add(item.name));
  shiriOrdState.correctChain = chain;
  shiriOrdState.placed = [];
  shiriOrdState.pool = shuffle([...chain]);
  shiriOrdState.mistakes = 0;
  renderShiriOrder();
}

function renderShiriOrder() {
  const container = document.getElementById('shiriorder-container');
  const s = shiriOrdState;
  const noAlt = str => str.replace(/alt="[^"]*"/, 'alt=""');

  // Build slot display
  let slotsHTML = '<div class="shiriord-slots">';
  for (let i = 0; i < s.correctChain.length; i++) {
    if (i > 0) slotsHTML += '<span class="shiri-arrow">→</span>';
    if (i < s.placed.length) {
      slotsHTML += `<div class="shiriord-slot filled"><div>${noAlt(getIcon(s.placed[i].name, 'color'))}</div><div class="shiri-complete-name">${s.placed[i].name}</div></div>`;
    } else {
      slotsHTML += `<div class="shiriord-slot"><div class="shiriord-slot-num">${i + 1}</div><div style="font-size:1.5rem;color:#ccc;">？</div></div>`;
    }
  }
  slotsHTML += '</div>';

  // Build pool cards
  const placedNames = new Set(s.placed.map(p => p.name));
  let poolHTML = '<div class="shiriord-pool">';
  s.pool.forEach((item, idx) => {
    const isPlaced = placedNames.has(item.name);
    poolHTML += `<div class="shiriord-card ${isPlaced ? 'placed' : ''}" data-idx="${idx}" data-name="${item.name}" onclick="tapShiriOrder(${idx})">
      <div>${noAlt(getIcon(item.name, 'color'))}</div>
    </div>`;
  });
  poolHTML += '</div>';

  // Hint: show names of all items (so player can figure out shiritori)
  const hintId = 'shiriord-hint-' + s.round;
  let namesHint = s.pool.map(item => item.name).join('、');

  container.innerHTML = `
    <div class="shiriord-round-info">ラウンド ${s.round} / ${s.totalRounds}</div>
    <div class="shiriord-instruction">ただしい じゅんばん に ならべよう！</div>
    ${slotsHTML}
    <button class="shiriord-hint-btn" id="${hintId}" onclick="revealShiriOrderHint(this)">ヒント 🔍</button>
    ${poolHTML}
  `;
}

function revealShiriOrderHint(btn) {
  if (btn.classList.contains('revealed')) return;
  const s = shiriOrdState;
  const names = s.pool.map(item => item.name).join('、');
  btn.innerHTML = `<strong>${names}</strong>`;
  btn.classList.add('revealed');
}

function tapShiriOrder(idx) {
  if (shiriOrdLocked) return;
  const s = shiriOrdState;
  const tapped = s.pool[idx];
  const placedNames = new Set(s.placed.map(p => p.name));
  if (placedNames.has(tapped.name)) return;

  const expectedIdx = s.placed.length;
  const expected = s.correctChain[expectedIdx];
  s.totalTaps++;

  const card = document.querySelector(`.shiriord-card[data-idx="${idx}"]`);

  if (tapped.name === expected.name) {
    // Correct!
    s.placed.push(tapped);
    s.correctTaps++;
    card.classList.add('correct-flash');
    Audio.sfx('correct');

    if (s.placed.length === s.correctChain.length) {
      // Round complete!
      shiriOrdLocked = true;
      if (s.mistakes === 0) s.correctRounds++;
      setTimeout(() => {
        shiriOrdLocked = false;
        finishShiriOrderRound();
      }, 600);
    } else {
      renderShiriOrder();
    }
  } else {
    // Wrong
    shiriOrdLocked = true;
    s.mistakes++;
    card.classList.add('wrong-flash');
    Audio.sfx('wrong');
    showToast('ちがうよ！');
    setTimeout(() => {
      card.classList.remove('wrong-flash');
      shiriOrdLocked = false;
    }, 600);
  }
}

function finishShiriOrderRound() {
  const s = shiriOrdState;
  s.allChains.push([...s.correctChain]);

  if (s.round >= s.totalRounds) { showShiriOrderResult(); return; }

  const container = document.getElementById('shiriorder-container');
  container.innerHTML = `

}

          <input type="text" id="player-name-input" value="${savedName}" maxlength="8"
            placeholder="なまえ を いれてね"
            style="width:160px;padding:8px 12px;border:2px solid #ddd;border-radius:12px;font-size:1rem;text-align:center;font-weight:700;outline:none;"
            onfocus="this.style.borderColor='#ab47bc'" onblur="this.style.borderColor='#ddd'">
        </div>

function beginMushitori() {
  // Save player name
  const nameInput = document.getElementById('player-name-input');
  if (nameInput && nameInput.value.trim()) setPlayerName(nameInput.value);
  const container = document.getElementById('mushi-container');
  const rect = container.getBoundingClientRect();
  const mission = JSON.parse(container.dataset.mission);

  // Set seasonal background
  const bgSeason = mission.season || 'spring';
  container.className = 'mushi-container mushi-bg-' + bgSeason;
  container.style.overflow = 'hidden';
  container.style.touchAction = 'none';

  mushiState = {
    timeLeft: 30,
    startTime: Date.now(),
    caught: 0,
    missed: 0,
    caughtItems: [],
    bugs: [],
    containerW: rect.width,
    containerH: rect.height,
    mission: mission,
    combo: 0,
    maxCombo: 0,
    wrongStreak: 0,
  };

  // Render field
  let html = '<div class="mushi-timer-bar"><div class="mushi-timer-fill" id="mushi-timer-fill" style="width:100%"></div></div>';
  html += `<div class="mushi-mission" id="mushi-mission">${mission.icon} ${mission.label}</div>`;
  html += '<div class="mushi-info" style="top:70px;"><span class="mushi-timer-text" id="mushi-time">⏱ 30</span><span class="mushi-score-correct" id="mushi-correct">⭕ 0</span><span class="mushi-score-miss" id="mushi-miss">✕ 0</span></div>';
  html += '<div class="mushi-combo" id="mushi-combo"></div>';

  // Decorative elements per season
  const seasonDeco = {
    spring: ['🌸', '🌼', '🌱', '🌿', '🍀'],
    summer: ['🌻', '☀️', '🌊', '🐚', '🍉'],
    autumn: ['🍂', '🍁', '🌾', '🍄', '🎃'],
    winter: ['❄️', '⛄', '🧣', '🎄', '✨'],
  };
  const deco = seasonDeco[bgSeason] || seasonDeco.spring;
  for (let i = 0; i < 5; i++) {
    const left = 5 + (i * 18) + Math.random() * 8;
    html += `<div class="mushi-flower" style="left:${left}%;bottom:${Math.random()*5}%;animation-delay:${Math.random()*2}s">${deco[i % deco.length]}</div>`;
  }

  // Clouds
  for (let i = 0; i < 3; i++) {
    const top = 5 + Math.random() * 10;
    const size = 40 + Math.random() * 40;
    html += `<div class="mushi-cloud" style="top:${top}%;left:-100px;width:${size}px;height:${size*0.5}px;animation-duration:${20+Math.random()*15}s;animation-delay:${i*7}s"></div>`;
  }

  container.innerHTML = html;

  // Spawn initial items (3 at once for more action)
  spawnMushiBug();
  setTimeout(() => spawnMushiBug(), 500);
  setTimeout(() => spawnMushiBug(), 1000);

  // Start timer
  mushiTimer = setInterval(mushiTick, 100);
}

function mushiTick() {
  if (!mushiState) return;
  const elapsed = (Date.now() - mushiState.startTime) / 1000;
  const remaining = Math.max(0, 30 - elapsed);
  mushiState.timeLeft = remaining;

  const timeEl = document.getElementById('mushi-time');
  const fillEl = document.getElementById('mushi-timer-fill');
  if (timeEl) timeEl.textContent = `⏱ ${Math.ceil(remaining)}`;
  if (fillEl) fillEl.style.width = `${(remaining / 30) * 100}%`;

  const now = Date.now();

  // Move items + auto-expire old ones
  mushiState.bugs.forEach(bug => {
    if (bug.caught) return;

    // Auto-expire after 4 seconds — item fades out and a new one spawns
    const age = (now - bug.spawnTime) / 1000;
    if (age > 4) {
      bug.caught = true; // mark so it won't be processed again
      const el = document.getElementById('mushi-bug-' + bug.id);
      if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }
      // No manual spawn needed — auto-spawn below handles replenishment
      return;
    }
    // Start fading at 3s
    if (age > 3) {
      const el = document.getElementById('mushi-bug-' + bug.id);
      if (el) el.style.opacity = String(1 - (age - 3));
    }

    bug.x += bug.vx;
    bug.y += bug.vy;

    // Bounce off walls
    const maxX = mushiState.containerW - 80;
    const maxY = mushiState.containerH - 100;
    if (bug.x < 10 || bug.x > maxX) { bug.vx *= -1; bug.x = Math.max(10, Math.min(maxX, bug.x)); }
    if (bug.y < 100 || bug.y > maxY) { bug.vy *= -1; bug.y = Math.max(100, Math.min(maxY, bug.y)); }

    // Random direction changes
    if (Math.random() < 0.02) { bug.vx += (Math.random() - 0.5) * 1.2; bug.vy += (Math.random() - 0.5) * 1.2; }
    // Cap speed
    const speed = Math.sqrt(bug.vx * bug.vx + bug.vy * bug.vy);
    const maxSpeed = bug.fast ? 3 : 1.8;
    if (speed > maxSpeed) { bug.vx *= maxSpeed / speed; bug.vy *= maxSpeed / speed; }

    const el = document.getElementById('mushi-bug-' + bug.id);
    if (el) {
      el.style.left = bug.x + 'px';
      el.style.top = bug.y + 'px';
    }
  });

  // Prune caught items to prevent array bloat (keep only active ones)
  mushiState.bugs = mushiState.bugs.filter(b => !b.caught);

  // Auto-spawn: keep at least 3 active items on screen
  if (mushiState.bugs.length < 3) {
    spawnMushiBug();
  }

  if (remaining <= 0) {
    clearInterval(mushiTimer);
    mushiTimer = null;
    showMushitoriResult();
  }
}

function spawnMushiBug() {
  if (!mushiState || mushiState.timeLeft <= 0) return;
  const container = document.getElementById('mushi-container');
  if (!container) return;

  // ~50% chance to spawn a correct item, ~50% wrong — ensures playability
  // If 3+ wrong items spawned in a row, force a correct one (ハズレ連続防止)
  const mission = mushiState.mission;
  const correctPool = DATA.filter(d => isCorrectTap(d, mission) && d.category !== 'tool');
  const wrongPool = DATA.filter(d => !isCorrectTap(d, mission) && d.category !== 'tool');
  const forceCorrect = mushiState.wrongStreak >= 3;
  const useCorrect = (forceCorrect || Math.random() < 0.45) && correctPool.length > 0;
  const pool = useCorrect ? correctPool : wrongPool;
  mushiState.wrongStreak = useCorrect ? 0 : mushiState.wrongStreak + 1;
  const item = pool[Math.floor(Math.random() * pool.length)];
  const id = Date.now() + Math.random();

  const maxX = mushiState.containerW - 90;
  const maxY = mushiState.containerH - 120;
  const x = 30 + Math.random() * (maxX - 30);
  const y = 140 + Math.random() * (maxY - 140);

  // Flying insects are faster, others move at moderate speed
  const flyingBugs = ['ちょうちょ', 'トンボ', 'ミツバチ', 'ホタル'];
  const isFast = flyingBugs.includes(item.name);
  const spd = isFast ? 2.5 : 1.2;

  const bug = {
    id, item, x, y,
    vx: (Math.random() - 0.5) * spd * 2,
    vy: (Math.random() - 0.5) * spd * 2,
    fast: isFast,
    caught: false,
    spawnTime: Date.now(),
  };
  mushiState.bugs.push(bug);

  const el = document.createElement('div');
  el.className = 'mushi-bug';
  el.id = 'mushi-bug-' + id;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.innerHTML = `${getIcon(item.name, 'color', true)}<span class="mushi-bug-name">${item.name}</span>`;
  el.onclick = () => catchMushiBug(bug);
  container.appendChild(el);
}

function catchMushiBug(bug) {
  if (!mushiState || bug.caught || mushiState.timeLeft <= 0) return;
  bug.caught = true;

  const el = document.getElementById('mushi-bug-' + bug.id);
  const container = document.getElementById('mushi-container');
  const correct = isCorrectTap(bug.item, mushiState.mission);

  if (correct) {
    // CORRECT tap
    if (el) {
      el.classList.add('caught');
      // Sparkle effect
      const effect = document.createElement('div');
      effect.className = 'mushi-catch-effect';
      effect.style.left = (bug.x + 20) + 'px';
      effect.style.top = (bug.y - 10) + 'px';
      effect.textContent = '⭕✨';
      container.appendChild(effect);
      setTimeout(() => effect.remove(), 700);
      setTimeout(() => el.remove(), 400);
    }

    mushiState.caught++;
    mushiState.combo++;
    if (mushiState.combo > mushiState.maxCombo) mushiState.maxCombo = mushiState.combo;
    mushiState.caughtItems.push(bug.item);

    // Add to collection
    if (!collectedItems.includes(bug.item.name)) {
      collectedItems.push(bug.item.name);
      localStorage.setItem('juken_collected', JSON.stringify(collectedItems));
    }

    Audio.sfx('correct');

    // Combo display with enhanced effects
    const comboEl = document.getElementById('mushi-combo');
    if (comboEl && mushiState.combo >= 3) {
      const comboTexts = ['', '', '',
        ['🔥 3れんぞく！', '✨ 3コンボ！いいよ！', '💪 3れんぞく スタート！'],
        ['🎯 4コンボ！ナイス！', '✨ 4れんぞく！いいかんじ！', '🌟 4コンボ！そのちょうし！'],
        ['⭐ 5コンボ！すごい！', '🌟 5れんぞく！のってきた！', '💫 5コンボ！かがやいてる！'],
        ['🔥 6コンボ！アツい！', '💫 6れんぞく！とまらない！', '🎵 6コンボ！リズムのり！'],
        ['⚡ 7コンボ！かっこいい！', '🌈 7れんぞく！にじいろ！', '🎪 7コンボ！サーカス！'],
        ['🌈 8コンボ！むてき！', '🦸 8れんぞく！ヒーロー！', '🚀 8コンボ！ロケット！'],
        ['👑 9コンボ！てんさい！', '🏅 9れんぞく！きんメダル！', '💎 9コンボ！ダイヤモンド！'],
        ['🎆 10コンボ！でんせつ！', '🏆 10れんぞく！チャンピオン！', '🌟 10コンボ！スーパースター！']];
      let txt;
      if (mushiState.combo < comboTexts.length) {
        const pool = comboTexts[mushiState.combo];
        txt = Array.isArray(pool) ? pool[Math.floor(Math.random() * pool.length)] : pool;
      } else {
        const overTexts = [`🏆 ${mushiState.combo}コンボ！かみわざ！`, `👑 ${mushiState.combo}れんぞく！まさに でんせつ！`, `🌟 ${mushiState.combo}コンボ！うちゅう いち！`];
        txt = overTexts[Math.floor(Math.random() * overTexts.length)];
      }
      comboEl.textContent = txt;
      comboEl.className = mushiState.combo >= 8 ? 'mushi-combo mega' : mushiState.combo >= 5 ? 'mushi-combo big' : 'mushi-combo';
      void comboEl.offsetWidth;

      // Floating combo effect at catch position
      const comboFx = document.createElement('div');
      comboFx.className = 'mushi-combo-effect';
      comboFx.style.left = (bug.x + 10) + 'px';
      comboFx.style.top = (bug.y - 20) + 'px';
      const fxEmojis = ['', '', '', '🔥', '✨', '🌟', '💫', '⚡', '🌈', '👑', '🎆'];
      const fxEmoji = mushiState.combo < fxEmojis.length ? fxEmojis[mushiState.combo] : '🏆';
      comboFx.textContent = `${fxEmoji}×${mushiState.combo}`;
      container.appendChild(comboFx);
      setTimeout(() => comboFx.remove(), 1000);

      // Screen glow for big combos (5+)
      if (mushiState.combo >= 5) {
        container.style.boxShadow = 'inset 0 0 60px rgba(255,215,0,0.3)';
        setTimeout(() => { if (container) container.style.boxShadow = 'none'; }, 400);
        Audio.sfx('star');
      }
    } else if (comboEl) {
      comboEl.textContent = '';
    }

    // Update display
    const correctEl = document.getElementById('mushi-correct');
    if (correctEl) correctEl.textContent = `⭕ ${mushiState.caught}`;
    const hdr = document.getElementById('mushi-caught-display');
    if (hdr) hdr.textContent = `⭕ ${mushiState.caught}`;

  } else {
    // WRONG tap — combo break!
    mushiState.combo = 0;
    const comboEl = document.getElementById('mushi-combo');
    if (comboEl) comboEl.textContent = '';

    if (el) {
      el.classList.add('miss');
      // Miss effect
      const effect = document.createElement('div');
      effect.className = 'mushi-miss-effect';
      effect.style.left = (bug.x + 10) + 'px';
      effect.style.top = (bug.y - 10) + 'px';
      effect.textContent = '✕';
      container.appendChild(effect);
      setTimeout(() => effect.remove(), 600);
      setTimeout(() => el.remove(), 500);
    }

    mushiState.missed++;

    Audio.sfx('wrong');

    // Flash screen briefly red
    container.style.boxShadow = 'inset 0 0 60px rgba(229,57,53,0.3)';
    setTimeout(() => { if (container) container.style.boxShadow = 'none'; }, 300);

    // Update display (caught stays the same — only missed increases)
    const missEl = document.getElementById('mushi-miss');
    if (missEl) missEl.textContent = `✕ ${mushiState.missed}`;
  }

  // Spawn replacement after a short delay
  setTimeout(() => spawnMushiBug(), 500 + Math.random() * 400);
}

function showMushitoriResult() {
  if (!mushiState) return;
  Audio.stopBGM();

  const score = mushiState.caughtItems.length;
  const missed = mushiState.missed;
  // 1 star per 2 correct catches (capped at 8 base stars)
  let earnedStars = Math.min(8, Math.floor(score / 2));
  // Accuracy bonus: 0 misses = +2, 1 miss = +1
  let accuracyBonus = 0;
  if (score > 0 && missed === 0) { accuracyBonus = 2; }
  else if (score >= 3 && missed <= 1) { accuracyBonus = 1; }
  earnedStars += accuracyBonus;
  // Combo bonus: scaled by streak
  let comboBonus = 0;
  if (mushiState.maxCombo >= 8) { comboBonus = 2; }
  else if (mushiState.maxCombo >= 5) { comboBonus = 1; }
  earnedStars += comboBonus;

  // Mission system (staged bonuses)
  const missionBonus = recordGameType('hayaoshi');
  earnedStars += missionBonus;

  // Star thresholds for display messages
  const correctPoolSize = DATA.filter(d => isCorrectTap(d, mushiState.mission) && d.category !== 'tool').length;
  const t3 = Math.max(3, Math.min(8, Math.round(correctPoolSize * 0.5)));
  const t2 = Math.max(2, Math.round(t3 * 0.6));
  const t1 = Math.max(1, Math.round(t3 * 0.35));

  const prevStars = totalStars;
  totalStars += earnedStars;
  localStorage.setItem('juken_stars', totalStars.toString());

  // Feed egg with earned stars
  const eggResult = feedEggStars(earnedStars);
  if (eggResult.hatched) {
    pendingEvolution = true;
    setTimeout(() => showHatchAnimation(eggResult.creature, eggResult.isNew, eggResult.overflow || 0), 500);
  }

  const prevBadge = (() => { let b = null; for (const x of BADGES) { if (prevStars >= x.stars) b = x; } return b; })();
  const newBadge = getCurrentBadge();
  const badgeUnlocked = newBadge && (!prevBadge || newBadge.stars > prevBadge.stars);

  // Save to ranking
  saveHayaoshiScore(getPlayerName(), score, mushiState.mission, earnedStars);

  quizHistory.push({ date: new Date().toISOString(), category: 'hayaoshi', difficulty: 'normal', score, total: score + missed, stars: earnedStars });
  localStorage.setItem('juken_history', JSON.stringify(quizHistory.slice(-50)));

  let emoji, title, message;
  if (score >= t3) { emoji = ic('emoji_events','ms-xxxl ms-star'); title = 'きせつ マスター！'; message = `${score}こ も みつけた！すごい！`; }
  else if (score >= t2) { emoji = ic('celebration','ms-xxxl'); title = 'よく できました！'; message = `${score}こ みつけたね！`; }
  else if (score >= t1) { emoji = ic('sentiment_satisfied','ms-xxxl'); title = 'がんばったね！'; message = 'もっと たくさん みつけよう！'; }
  else { emoji = ic('fitness_center','ms-xxxl'); title = 'ドンマイ！'; message = 'もう いちど ちゃれんじ！'; }

  const badgeHTML = badgeUnlocked ? `<div style="background:#fff8e1;border:2px solid #ffd700;border-radius:16px;padding:16px;margin-bottom:16px;text-align:center;"><div style="font-size:2rem;">${newBadge.emoji}</div><div style="font-weight:800;font-size:1.1rem;margin-top:4px;">しょうごう ゲット！</div><div style="font-size:1.2rem;font-weight:700;color:#f57f17;">${newBadge.title}</div></div>` : '';
  const evoHTML = eggResult.hatched ? `<div style="background:linear-gradient(135deg,#e8f5e9,#fff8e1);border:2px solid #8bc34a;border-radius:16px;padding:16px;margin-bottom:16px;text-align:center;"><div style="font-weight:800;font-size:0.9rem;color:#558b2f;margin-bottom:8px;">🥚 たまご が かえった！</div><div style="width:80px;height:80px;margin:8px auto;">${creatureSVG(eggResult.creature.key)}</div><div style="font-weight:800;color:${RARITY_INFO[eggResult.creature.rarity].color}">${RARITY_INFO[eggResult.creature.rarity].stars} ${eggResult.creature.label}</div>${eggResult.isNew ? '<div style="color:#ffd700;font-weight:700;margin-top:4px;">NEW!</div>' : ''}</div>` : '';

  // Show correctly tapped items grid
  let caughtHTML = '';
  if (mushiState.caughtItems.length > 0) {
    const unique = [...new Map(mushiState.caughtItems.map(i => [i.name, i])).values()];
    caughtHTML = '<div style="margin:16px 0;"><div style="font-size:0.85rem;color:#999;margin-bottom:8px;">みつけた もの</div><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">';
    unique.forEach(item => {
      const count = mushiState.caughtItems.filter(c => c.name === item.name).length;
      caughtHTML += `<div style="background:#fff;border-radius:12px;padding:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);text-align:center;min-width:70px;max-width:90px;">
        <div class="result-icon-box">${getIcon(item.name, 'color')}</div>
        <div style="font-size:0.7rem;font-weight:700;margin-top:2px;">${item.name}</div>
        ${count > 1 ? `<div style="font-size:0.65rem;color:#e91e63;">×${count}</div>` : ''}
      </div>`;
    });
    caughtHTML += '</div></div>';
  }

  // Mission recap
  const missionLabel = mushiState.mission.icon + ' ' + mushiState.mission.label;

  const container = document.getElementById('mushi-container');
  container.className = 'mushi-container';
  container.style.overflow = 'auto';
  container.style.overflowX = 'hidden';
  container.style.touchAction = 'auto';
  container.style.webkitOverflowScrolling = 'touch';
  container.style.height = 'calc(100dvh - 56px)';
  container.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 20px 60px;background:linear-gradient(135deg,#e8f5e9,#fff8e1);min-height:100%;">
      <div style="font-size:0.85rem;color:#888;margin-bottom:8px;">${missionLabel}</div>
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${title}</div>
      <div class="result-score" style="font-size:3rem;">${score}</div>
      <div class="result-label">こ みつけた！</div>
      ${missed > 0 ? `<div style="color:#e53935;font-size:0.9rem;margin-top:4px;">まちがい: ${missed}かい</div>` : ''}
      ${mushiState.maxCombo >= 3 ? `<div style="color:#ff6d00;font-weight:800;font-size:1.1rem;margin-top:6px;">🔥 さいだいコンボ: ${mushiState.maxCombo}</div>` : ''}
      ${accuracyBonus > 0 ? `<div class="combo-bonus">${ic('verified','')} ${missed === 0 ? 'ノーミス' : 'せいかく'}ボーナス +${accuracyBonus}${ic('star','ms-star')}</div>` : ''}
      ${comboBonus > 0 ? `<div class="combo-bonus">${ic('local_fire_department','ms-fire')} コンボボーナス +${comboBonus}${ic('star','ms-star')}</div>` : ''}
      ${missionBonus >= MISSION_STAGE2_BONUS ? `<div class="combo-bonus">🏆 ミッション ぜんぶクリア！ +${missionBonus}${ic('star','ms-star')}</div>` : missionBonus > 0 ? `<div class="combo-bonus">🎯 ミッション ${MISSION_STAGE1_COUNT}つクリア！ +${missionBonus}${ic('star','ms-star')}</div>` : ''}
      <div class="result-stars">${earnedStars > 0 ? ic('star','ms-star').repeat(Math.min(earnedStars, 12)) + ' ゲット！' : ''}</div>
      ${evoHTML}
      ${badgeHTML}
      <div class="result-message">${message}</div>
      ${buildRankingHTML(score)}
      ${caughtHTML}
      <div class="result-buttons" style="margin-top:16px;">
        <button class="result-btn result-btn-retry" onclick="startMushitori()">もう いちど</button>
        <button class="result-btn result-btn-home" onclick="showMenu()">🏠 メニューに もどる</button>
      </div>
    </div>
  `;

  if (score >= t2) { fireConfetti(); Audio.sfx('fanfare'); }
  else if (score >= t1) Audio.sfx('star');
}

function confirmQuitMushitori() {
  if (mushiState && mushiState.caught > 0) {
    showModal('はやおしを やめる？', () => {
      if (mushiTimer) { clearInterval(mushiTimer); mushiTimer = null; }
      mushiState = null;
      showMenu();
    });
    return;
  }
  if (mushiTimer) { clearInterval(mushiTimer); mushiTimer = null; }
  mushiState = null;
  showMenu();
}

// ===== HAYAOSHI RANKING =====
function getPlayerName() {
  return localStorage.getItem('juken_player_name') || '';
}
function setPlayerName(name) {
  localStorage.setItem('juken_player_name', name.trim().slice(0, 8));
}
function getHayaoshiRanking() {
  try { return JSON.parse(localStorage.getItem('juken_hayaoshi_ranking') || '[]'); }
  catch { return []; }
}
function saveHayaoshiScore(name, score, mission, stars) {
  const ranking = getHayaoshiRanking();
  ranking.push({
    name: name || 'なまえなし',
    score,
    mission: mission.label,
    missionIcon: mission.icon,
    stars,
    date: new Date().toISOString(),
  });
  // Sort by score desc, keep top 20
  ranking.sort((a, b) => b.score - a.score || b.stars - a.stars);
  localStorage.setItem('juken_hayaoshi_ranking', JSON.stringify(ranking.slice(0, 20)));
}
function buildRankingHTML(currentScore, compact) {
  const ranking = getHayaoshiRanking();
  if (ranking.length === 0) return '';
  const top5 = ranking.slice(0, 5);
  const medals = ['🥇', '🥈', '🥉', '4.', '5.'];
  if (compact) {
    let html = '<div style="margin:12px 0 4px;text-align:center;">';
    html += `<div style="font-size:0.7rem;font-weight:700;color:#999;margin-bottom:4px;">🏆 ランキング</div>`;
    top5.forEach((r, i) => {
      html += `<div style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:0.75rem;padding:2px 0;">
        <span style="width:22px;text-align:center;">${medals[i]}</span>
        <span style="font-weight:700;color:#555;min-width:50px;text-align:left;">${r.name}</span>
        <span style="font-weight:800;color:#6a1b9a;">${r.score}こ</span>
      </div>`;
    });
    html += '</div>';
    return html;
  }
  let html = '<div style="background:#f5f0ff;border-radius:16px;padding:14px;margin:16px 0;text-align:center;">';
  html += `<div style="font-size:0.9rem;font-weight:800;margin-bottom:10px;">${ic('leaderboard','')} ランキング TOP5</div>`;
  top5.forEach((r, i) => {
    const isNew = r.score === currentScore && i === ranking.findIndex(x => x.score === currentScore);
    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:10px;margin-bottom:4px;${isNew ? 'background:#fff3e0;border:1px solid #ffb74d;' : 'background:#fff;'}">
      <span style="font-size:1.1rem;width:28px;text-align:center;">${medals[i]}</span>
      <span style="flex:1;text-align:left;font-weight:700;font-size:0.85rem;">${r.name}</span>
      <span style="font-size:0.8rem;color:#888;">${r.missionIcon || ''}</span>
      <span style="font-weight:800;font-size:1rem;color:#6a1b9a;">${r.score}こ</span>
      <span style="font-size:0.75rem;color:#ff9800;">${ic('star','ms-star').repeat(Math.min(r.stars, 5))}</span>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ===== UTILITIES =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1200);
}

// Child-friendly confirm modal (replaces browser confirm())
function showModal(msg, onYes) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-msg">${msg}</div>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-no" id="modal-no">やめない</button>
        <button class="modal-btn modal-btn-yes" id="modal-yes">やめる</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-no').onclick = () => { root.innerHTML = ''; };
  document.getElementById('modal-yes').onclick = () => { root.innerHTML = ''; onYes(); };
  document.getElementById('modal-overlay').onclick = (e) => { if (e.target === e.currentTarget) root.innerHTML = ''; };
}

// Long-press reset (3 seconds hold to confirm)
let resetHoldTimer = null;
let resetAnimFrame = null;
let resetStartTime = 0;
const RESET_HOLD_MS = 3000;

function startResetHold(e) {
  e.preventDefault();
  resetStartTime = Date.now();
  const bar = document.getElementById('reset-progress');
  if (bar) bar.style.transition = 'none';

  function animate() {
    const elapsed = Date.now() - resetStartTime;
    const pct = Math.min(100, (elapsed / RESET_HOLD_MS) * 100);
    const bar = document.getElementById('reset-progress');
    if (bar) bar.style.width = pct + '%';
    if (elapsed < RESET_HOLD_MS) {
      resetAnimFrame = requestAnimationFrame(animate);
    }
  }
  resetAnimFrame = requestAnimationFrame(animate);

  resetHoldTimer = setTimeout(() => {
    cancelResetHold();
    localStorage.removeItem('juken_history');
    localStorage.removeItem('juken_stars');
    localStorage.removeItem('juken_collected');
    localStorage.removeItem('juken_egg');
    localStorage.removeItem('juken_egg_collection');
    quizHistory = [];
    totalStars = 0;
    collectedItems = [];
    showToast('リセット しました！');
    showScoreBoard();
  }, RESET_HOLD_MS);
}

function cancelResetHold() {
  if (resetHoldTimer) { clearTimeout(resetHoldTimer); resetHoldTimer = null; }
  if (resetAnimFrame) { cancelAnimationFrame(resetAnimFrame); resetAnimFrame = null; }
  const bar = document.getElementById('reset-progress');
  if (bar) bar.style.width = '0';
}

function fireConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff8fab', '#a855f7'];
  for (let i = 0; i < 40; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    confetti.style.animationDelay = Math.random() * 0.5 + 's';
    confetti.style.width = (6 + Math.random() * 8) + 'px';
    confetti.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(confetti);
  }
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}
