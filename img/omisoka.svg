  <path d="M46 66 L40 56" stroke-width="1.5"/>
  <!-- steam -->
  <path d="M44 62 C42 58 44 56 44 54" stroke-width="0.8"/>
  <path d="M50 62 C50 58 52 56 50 54" stroke-width="0.8"/>
  <path d="M56 62 C58 58 56 56 56 54" stroke-width="0.8"/>
