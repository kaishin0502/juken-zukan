<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Christmas tree -->
  <!-- star on top -->
  <path d="M50 6 L52 12 L58 12 L53 16 L55 22 L50 18 L45 22 L47 16 L42 12 L48 12Z" fill="#333"/>
  <!-- tree layers (3 tiers) -->
  <path d="M50 18 L34 36 L66 36Z"/>
  <path d="M50 30 L28 52 L72 52Z"/>
  <path d="M50 44 L22 68 L78 68Z"/>
  <!-- trunk -->
  <rect x="44" y="68" width="12" height="10"/>
  <!-- ornaments -->
  <circle cx="42" cy="34" r="2.5" fill="#333"/>
  <circle cx="58" cy="34" r="2.5"/>
  <circle cx="36" cy="48" r="2.5"/>
  <circle cx="50" cy="46" r="2.5" fill="#333"/>
  <circle cx="64" cy="48" r="2.5"/>
  <circle cx="32" cy="62" r="3"/>
  <circle cx="44" cy="60" r="2.5" fill="#333"/>
  <circle cx="56" cy="62" r="2.5"/>
  <circle cx="68" cy="60" r="3" fill="#333"/>
  <!-- garland/tinsel -->
  <path d="M38 36 C42 40 46 38 50 42 C54 38 58 40 62 36" stroke-width="0.8"/>
  <path d="M32 52 C38 56 44 54 50 58 C56 54 62 56 68 52" stroke-width="0.8"/>
  <!-- presents under tree -->
  <rect x="24" y="78" width="12" height="10" rx="1"/>
  <path d="M24 83 L36 83" stroke-width="0.8"/>
  <path d="M30 78 L30 88" stroke-width="0.8"/>
  <rect x="62" y="76" width="14" height="12" rx="1"/>
  <path d="M62 82 L76 82" stroke-width="0.8"/>
  <path d="M69 76 L69 88" stroke-width="0.8"/>
  <!-- ribbon bow on presents -->
  <path d="M28 78 C26 76 28 74 30 76 C32 74 34 76 32 78" stroke-width="0.8"/>
  <path d="M67 76 C65 74 67 72 69 74 C71 72 73 74 71 76" stroke-width="0.8"/>
</svg>