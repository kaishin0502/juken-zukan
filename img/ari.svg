<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- ant - 3 body segments, 6 legs, antennae -->
  <!-- head -->
  <circle cx="28" cy="46" r="9"/>
  <!-- mandibles -->
  <path d="M20 48 C16 50 14 48 16 44" stroke-width="1.2"/>
  <path d="M20 50 C16 54 14 52 16 48" stroke-width="1.2"/>
  <!-- eyes -->
  <circle cx="24" cy="44" r="2" fill="#333"/>
  <!-- antennae -->
  <path d="M24 38 C20 30 14 24 10 22"/>
  <path d="M28 38 C28 28 26 22 22 18"/>
  <!-- thorax -->
  <ellipse cx="44" cy="46" rx="8" ry="7"/>
  <!-- abdomen -->
  <ellipse cx="66" cy="48" rx="14" ry="12"/>
  <!-- connection lines -->
  <path d="M37 46 L36 46" stroke-width="2"/>
  <path d="M52 46 L52 46" stroke-width="2"/>
  <!-- legs from thorax -->
  <path d="M38 50 C34 58 28 64 24 68" stroke-width="1.3"/>
  <path d="M44 52 C42 60 38 66 34 70" stroke-width="1.3"/>
  <path d="M50 50 C52 58 54 64 52 70" stroke-width="1.3"/>
  <!-- knee joints -->
  <path d="M24 68 L20 72" stroke-width="1.3"/>
  <path d="M34 70 L30 74" stroke-width="1.3"/>
  <path d="M52 70 L56 74" stroke-width="1.3"/>
  <!-- legs from thorax (other side suggested by slight offset) -->
  <path d="M40 42 C36 34 30 30 26 28" stroke-width="1.2"/>
  <path d="M46 42 C46 34 44 28 42 24" stroke-width="1.2"/>
  <path d="M50 44 C54 36 58 32 62 30" stroke-width="1.2"/>
</svg>