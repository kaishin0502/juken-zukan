<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- katatsumuri (snail) - spiral shell, eye stalks -->
  <!-- shell (spiral) -->
  <circle cx="55" cy="42" r="22"/>
  <path d="M55 20 C42 20 38 28 38 36 C38 44 44 50 52 50 C58 50 62 46 62 40 C62 36 58 32 54 32 C50 32 48 36 48 40 C48 42 50 44 52 44" stroke-width="1.3"/>
  <!-- body -->
  <path d="M33 58 C20 60 10 64 8 68 C6 72 10 76 20 76 C35 76 55 74 70 72 C78 70 80 66 76 62 C72 58 65 56 55 56" stroke-width="1.8"/>
  <!-- foot ripples -->
  <path d="M14 72 C18 70 22 72 26 70 C30 68 34 70 38 68" stroke-width="0.8" opacity="0.4"/>
  <!-- eye stalks -->
  <path d="M20 60 C18 52 16 46 14 40" stroke-width="1.5"/>
  <path d="M26 58 C26 50 26 44 26 38" stroke-width="1.5"/>
  <!-- eyes -->
  <circle cx="14" cy="38" r="2.5" fill="#333"/>
  <circle cx="26" cy="36" r="2.5" fill="#333"/>
  <!-- mouth -->
  <path d="M18 66 C20 68 22 66" stroke-width="1" opacity="0.6"/>
</svg>
