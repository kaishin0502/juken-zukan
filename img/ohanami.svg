<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- cherry blossom viewing - tree with blossoms, picnic sheet -->
  <!-- tree trunk -->
  <path d="M50 50 L48 88 M50 50 L52 88" stroke-width="3"/>
  <path d="M48 70 C40 68 36 72 34 78" stroke-width="2"/>
  <!-- crown of blossoms -->
  <circle cx="36" cy="30" r="12"/>
  <circle cx="50" cy="22" r="14"/>
  <circle cx="64" cy="30" r="12"/>
  <circle cx="42" cy="40" r="10"/>
  <circle cx="58" cy="40" r="10"/>
  <!-- small flowers in crown -->
  <path d="M36 28 L34 26 M36 28 L38 26 M36 28 L36 30 M36 28 L34 30 M36 28 L38 30" stroke-width="0.8"/>
  <path d="M50 20 L48 18 M50 20 L52 18 M50 20 L50 22 M50 20 L48 22 M50 20 L52 22" stroke-width="0.8"/>
  <path d="M64 28 L62 26 M64 28 L66 26 M64 28 L64 30" stroke-width="0.8"/>
  <!-- falling petals -->
  <ellipse cx="26" cy="56" rx="2" ry="1" transform="rotate(-30 26 56)"/>
  <ellipse cx="74" cy="50" rx="2" ry="1" transform="rotate(20 74 50)"/>
  <ellipse cx="30" cy="68" rx="2" ry="1" transform="rotate(-15 30 68)"/>
  <!-- picnic sheet -->
  <path d="M10 82 L42 78 L44 92 L8 92Z" stroke-width="1.2"/>
  <!-- grid on sheet -->
  <path d="M18 80 L16 92 M26 79 L24 92 M34 78 L32 92" stroke-width="0.6"/>
  <!-- bento box on sheet -->
  <rect x="16" y="82" width="10" height="6" rx="1"/>
  <path d="M16 85 L26 85" stroke-width="0.6"/>
</svg>