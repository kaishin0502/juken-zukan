  <circle cx="50" cy="22" r="11"/>
  <!-- hair with ornament -->
  <path d="M39 18 C39 12 44 8 50 8 C56 8 61 12 61 18" stroke-width="2"/>
  <circle cx="58" cy="14" r="3"/><circle cx="58" cy="14" r="1.5" fill="#333"/>
