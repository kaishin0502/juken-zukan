  <!-- torii gate suggestion -->
  <path d="M76 60 L76 86 M88 60 L88 86" stroke-width="2"/>
  <path d="M73 60 L91 60" stroke-width="2.5"/>
  <path d="M74 66 L90 66" stroke-width="1.5"/>
