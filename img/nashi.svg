<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- nashi (Japanese pear) - round shape, stem, leaf -->
  <!-- body (rounder than western pear) -->
  <path d="M50 24 C36 28 22 42 22 58 C22 74 34 86 50 86 C66 86 78 74 78 58 C78 42 64 28 50 24"/>
  <!-- texture dots (nashi has rough skin) -->
  <circle cx="36" cy="48" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="44" cy="42" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="58" cy="44" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="66" cy="52" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="40" cy="60" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="54" cy="56" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="62" cy="64" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="46" cy="72" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="56" cy="74" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="34" cy="68" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="64" cy="56" r="0.8" fill="#333" opacity="0.3"/>
  <circle cx="42" cy="52" r="0.8" fill="#333" opacity="0.3"/>
  <!-- stem -->
  <path d="M50 24 L50 14" stroke-width="2"/>
  <!-- leaf -->
  <path d="M50 18 C56 14 64 12 68 16 C64 20 56 20 50 18" fill="none"/>
  <path d="M50 18 L62 14" stroke-width="0.8"/>
  <!-- bottom dimple -->
  <path d="M47 84 C49 86 51 86 53 84" stroke-width="1"/>
</svg>
