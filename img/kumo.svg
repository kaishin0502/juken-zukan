<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- kumo (spider) - round body, 8 legs -->
  <!-- head (cephalothorax) -->
  <ellipse cx="50" cy="36" rx="10" ry="9"/>
  <!-- abdomen -->
  <ellipse cx="50" cy="56" rx="14" ry="12"/>
  <!-- pattern on abdomen -->
  <path d="M44 50 L50 46 L56 50" stroke-width="0.8" opacity="0.5"/>
  <path d="M42 56 L50 52 L58 56" stroke-width="0.8" opacity="0.5"/>
  <!-- eyes (8 eyes in 2 rows) -->
  <circle cx="46" cy="32" r="1.8" fill="#333"/>
  <circle cx="54" cy="32" r="1.8" fill="#333"/>
  <circle cx="44" cy="36" r="1.2" fill="#333"/>
  <circle cx="56" cy="36" r="1.2" fill="#333"/>
  <!-- pedipalps -->
  <path d="M44 40 C40 42 38 40 38 38" stroke-width="1.2"/>
  <path d="M56 40 C60 42 62 40 62 38" stroke-width="1.2"/>
  <!-- legs - left side -->
  <path d="M42 30 C32 24 22 20 14 18 C16 22 20 24 24 28" stroke-width="1.3"/>
  <path d="M40 34 C30 32 18 32 10 34 C14 38 22 38 28 36" stroke-width="1.3"/>
  <path d="M40 38 C30 42 18 46 10 52 C16 52 24 48 30 44" stroke-width="1.3"/>
  <path d="M42 42 C34 50 28 58 24 68 C28 64 34 56 38 48" stroke-width="1.3"/>
  <!-- legs - right side -->
  <path d="M58 30 C68 24 78 20 86 18 C84 22 80 24 76 28" stroke-width="1.3"/>
  <path d="M60 34 C70 32 82 32 90 34 C86 38 78 38 72 36" stroke-width="1.3"/>
  <path d="M60 38 C70 42 82 46 90 52 C84 52 76 48 70 44" stroke-width="1.3"/>
  <path d="M58 42 C66 50 72 58 76 68 C72 64 66 56 62 48" stroke-width="1.3"/>
</svg>
