<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- kabocha (pumpkin) - round with vertical ridges -->
  <!-- main body -->
  <ellipse cx="50" cy="56" rx="34" ry="28"/>
  <!-- vertical ridges -->
  <path d="M50 28 C50 40 50 60 50 84" stroke-width="1" opacity="0.5"/>
  <path d="M32 32 C30 44 30 64 32 80" stroke-width="1" opacity="0.5"/>
  <path d="M68 32 C70 44 70 64 68 80" stroke-width="1" opacity="0.5"/>
  <path d="M20 40 C18 50 18 62 20 72" stroke-width="1" opacity="0.5"/>
  <path d="M80 40 C82 50 82 62 80 72" stroke-width="1" opacity="0.5"/>
  <!-- stem -->
  <rect x="46" y="22" width="8" height="10" rx="2"/>
  <path d="M46 24 L44 22 L42 20" stroke-width="1.5"/>
  <!-- curly vine -->
  <path d="M54 24 C60 20 64 16 62 12 C60 10 56 12 58 16 C60 20 64 18 66 14" stroke-width="1.2"/>
</svg>
