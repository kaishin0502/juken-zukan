<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- cricket - darker, rounder than suzumushi -->
  <!-- head -->
  <circle cx="32" cy="44" r="9"/>
  <circle cx="28" cy="42" r="2" fill="#333"/>
  <circle cx="36" cy="42" r="2" fill="#333"/>
  <!-- antennae -->
  <path d="M28 36 C22 26 16 18 10 14"/>
  <path d="M36 36 C40 26 46 18 52 14"/>
  <!-- pronotum -->
  <path d="M38 36 C42 34 50 34 54 36 L56 44 C56 48 50 50 44 50 C38 50 36 48 36 44Z"/>
  <!-- body -->
  <ellipse cx="66" cy="46" rx="18" ry="14"/>
  <!-- wing lines -->
  <path d="M56 38 C62 34 72 32 78 36" stroke-width="1"/>
  <path d="M56 42 L76 38" stroke-width="0.7"/>
  <path d="M58 46 L78 42" stroke-width="0.7"/>
  <!-- front legs -->
  <path d="M40 50 C36 56 32 62 28 66" stroke-width="1.2"/>
  <path d="M48 52 C44 58 40 64 36 70" stroke-width="1.2"/>
  <!-- large back jumping legs -->
  <path d="M70 56 C76 58 84 50 88 40" stroke-width="1.5"/>
  <path d="M88 40 C90 46 90 56 86 66 C84 72 80 76 76 80" stroke-width="1.5"/>
  <!-- tail cerci -->
  <path d="M82 48 L90 46"/>
  <path d="M82 50 L90 54"/>
</svg>