<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- firefly - elongated body with glowing end -->
  <!-- head (small, partially hidden) -->
  <circle cx="50" cy="20" r="6"/>
  <circle cx="48" cy="18" r="1.5" fill="#333"/>
  <circle cx="52" cy="18" r="1.5" fill="#333"/>
  <!-- antennae -->
  <path d="M46 16 C42 10 38 8 34 8"/>
  <path d="M54 16 C58 10 62 8 66 8"/>
  <!-- pronotum (shield-like, covers head) -->
  <path d="M38 22 C38 18 44 16 50 16 C56 16 62 18 62 22 L62 30 C62 32 58 34 50 34 C42 34 38 32 38 30Z"/>
  <!-- elytra -->
  <path d="M38 34 C36 40 36 48 38 54 C40 58 44 60 50 60 C56 60 60 58 62 54 C64 48 64 40 62 34"/>
  <path d="M50 34 L50 60" stroke-width="0.8"/>
  <!-- abdomen with light organ -->
  <path d="M40 60 C40 66 44 72 50 72 C56 72 60 66 60 60"/>
  <!-- segments -->
  <path d="M40 64 L60 64" stroke-width="0.8"/>
  <path d="M42 68 L58 68" stroke-width="0.8"/>
  <!-- light glow (dotted circle to indicate light) -->
  <circle cx="50" cy="78" r="10" stroke-dasharray="2 2" stroke-width="1"/>
  <circle cx="50" cy="78" r="6" stroke-dasharray="1.5 1.5" stroke-width="0.8"/>
  <!-- legs -->
  <path d="M40 38 C34 36 28 38 24 42" stroke-width="1.2"/>
  <path d="M40 48 C34 48 28 52 24 56" stroke-width="1.2"/>
  <path d="M60 38 C66 36 72 38 76 42" stroke-width="1.2"/>
  <path d="M60 48 C66 48 72 52 76 56" stroke-width="1.2"/>
</svg>