<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- bell cricket - oval body, long antennae, musical wings -->
  <!-- head -->
  <circle cx="36" cy="42" r="8"/>
  <circle cx="33" cy="40" r="1.5" fill="#333"/>
  <circle cx="39" cy="40" r="1.5" fill="#333"/>
  <!-- long antennae (very long, characteristic) -->
  <path d="M32 36 C24 22 16 10 8 4"/>
  <path d="M40 36 C42 22 48 10 54 4"/>
  <!-- pronotum -->
  <ellipse cx="48" cy="44" rx="6" ry="5"/>
  <!-- body/abdomen -->
  <ellipse cx="64" cy="46" rx="16" ry="12"/>
  <!-- wing pattern (cricket has distinctive wing venation) -->
  <path d="M54 38 C58 32 66 28 74 30 C78 32 78 38 74 42" stroke-width="1"/>
  <path d="M56 40 L70 34" stroke-width="0.7"/>
  <path d="M58 42 L72 38" stroke-width="0.7"/>
  <!-- legs (back legs are long for jumping) -->
  <path d="M42 50 C38 56 34 60 30 64" stroke-width="1.2"/>
  <path d="M54 54 C50 60 46 66 42 70" stroke-width="1.2"/>
  <!-- long back legs (jumping legs) -->
  <path d="M68 54 C72 56 78 52 82 44 C84 40 86 44 88 52 C88 58 84 64 80 70" stroke-width="1.5"/>
  <!-- tail cerci -->
  <path d="M78 48 L86 46"/>
  <path d="M78 50 L86 52"/>
  <!-- musical note suggestion -->
  <path d="M20 18 C18 14 22 12 22 16" stroke-width="1"/>
  <path d="M22 16 L22 22" stroke-width="1"/>
  <circle cx="20" cy="22" r="2" stroke-width="1"/>
</svg>