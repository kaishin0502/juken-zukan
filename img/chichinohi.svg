<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- chichinohi (Father's Day) - necktie and gift -->
  <!-- necktie -->
  <path d="M42 8 L58 8 L56 14 L52 12 L50 50 L48 12 L44 14 Z"/>
  <!-- tie knot -->
  <path d="M44 14 L48 12 L50 16 L52 12 L56 14 L50 20 Z"/>
  <!-- tie body -->
  <path d="M48 20 C46 30 44 40 42 56 L50 62 L58 56 C56 40 54 30 52 20"/>
  <!-- tie stripes -->
  <path d="M46 30 L54 26" stroke-width="1" opacity="0.5"/>
  <path d="M45 38 L55 34" stroke-width="1" opacity="0.5"/>
  <path d="M44 46 L56 42" stroke-width="1" opacity="0.5"/>
  <!-- gift box below -->
  <rect x="22" y="70" width="28" height="22" rx="2"/>
  <!-- ribbon on gift -->
  <line x1="36" y1="70" x2="36" y2="92" stroke-width="1.5"/>
  <line x1="22" y1="81" x2="50" y2="81" stroke-width="1.5"/>
  <!-- ribbon bow -->
  <path d="M36 70 C32 64 26 62 28 66 C30 70 34 70 36 70"/>
  <path d="M36 70 C40 64 46 62 44 66 C42 70 38 70 36 70"/>
  <!-- "Thank you" yellow rose -->
  <circle cx="72" cy="78" r="6"/>
  <circle cx="72" cy="78" r="3"/>
  <path d="M72 84 L72 96" stroke-width="1.5"/>
  <path d="M72 90 C66 86 62 84" stroke-width="1.2"/>
</svg>
