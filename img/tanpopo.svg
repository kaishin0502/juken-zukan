  <!-- radiating petals -->
  <path d="M50 24 L50 12"/><path d="M56 26 L64 16"/><path d="M58 30 L70 28"/>
  <path d="M56 34 L64 44"/><path d="M50 36 L50 44"/><path d="M44 34 L36 44"/>
  <path d="M42 30 L30 28"/><path d="M44 26 L36 16"/>
