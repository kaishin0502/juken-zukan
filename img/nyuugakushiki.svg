<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- school entrance ceremony - child with randoseru (school bag) and sakura -->
  <!-- child head -->
  <circle cx="50" cy="26" r="12"/>
  <!-- hair -->
  <path d="M38 22 C38 14 44 10 50 10 C56 10 62 14 62 22" stroke-width="2"/>
  <!-- face -->
  <circle cx="46" cy="26" r="1.5" fill="#333"/>
  <circle cx="54" cy="26" r="1.5" fill="#333"/>
  <path d="M46 30 Q50 33 54 30" stroke-width="1"/>
  <!-- body -->
  <path d="M42 38 L42 64 L58 64 L58 38" stroke-width="1.5"/>
  <!-- collar -->
  <path d="M42 38 L50 46 L58 38"/>
  <!-- buttons -->
  <circle cx="50" cy="48" r="1" fill="#333"/>
  <circle cx="50" cy="54" r="1" fill="#333"/>
  <circle cx="50" cy="60" r="1" fill="#333"/>
  <!-- randoseru (backpack) hint on side -->
  <path d="M58 40 L64 42 L64 58 L58 60" stroke-width="1.5"/>
  <path d="M62 42 L62 58" stroke-width="0.8"/>
  <!-- legs -->
  <path d="M44 64 L44 80 M56 64 L56 80" stroke-width="1.5"/>
  <!-- shoes -->
  <path d="M40 80 L48 80" stroke-width="2"/>
  <path d="M52 80 L60 80" stroke-width="2"/>
  <!-- sakura petals floating -->
  <ellipse cx="22" cy="18" rx="3" ry="1.5" transform="rotate(-20 22 18)"/>
  <ellipse cx="78" cy="22" rx="3" ry="1.5" transform="rotate(15 78 22)"/>
  <ellipse cx="18" cy="40" rx="2" ry="1" transform="rotate(-30 18 40)"/>
  <!-- 入学式 gate/school hint -->
  <path d="M8 86 L8 70 L14 70" stroke-width="2"/>
  <path d="M92 86 L92 70 L86 70" stroke-width="2"/>
  <path d="M8 86 L92 86" stroke-width="2"/>
</svg>