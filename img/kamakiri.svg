<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- kamakiri (praying mantis) - triangular head, folded arms -->
  <!-- head (triangle) -->
  <path d="M28 34 C24 30 22 26 26 24 C30 22 34 26 34 30 C34 34 32 36 28 36 Z"/>
  <!-- eyes -->
  <circle cx="25" cy="28" r="2.5" fill="#333"/>
  <circle cx="31" cy="28" r="2.5" fill="#333"/>
  <!-- antennae -->
  <path d="M26 24 C22 16 16 10 10 8" stroke-width="1"/>
  <path d="M30 24 C30 16 28 10 24 6" stroke-width="1"/>
  <!-- prothorax (long neck) -->
  <path d="M30 36 C34 40 36 44 38 50" stroke-width="2"/>
  <!-- folded front legs (prayer pose) -->
  <path d="M32 38 C28 42 24 46 20 44 C18 42 20 38 24 36" stroke-width="1.3"/>
  <path d="M20 44 L16 48 L12 46" stroke-width="1.2"/>
  <path d="M34 40 C36 44 38 48 36 50 C34 48 32 44 30 42" stroke-width="1.3"/>
  <path d="M36 50 L38 54 L42 52" stroke-width="1.2"/>
  <!-- body/abdomen -->
  <ellipse cx="54" cy="56" rx="16" ry="8" transform="rotate(-10 54 56)"/>
  <!-- wings (folded) -->
  <path d="M42 50 C46 44 56 40 66 42" stroke-width="1" opacity="0.6"/>
  <path d="M44 52 C48 46 58 44 68 46" stroke-width="1" opacity="0.6"/>
  <!-- middle legs -->
  <path d="M44 58 C40 64 36 70 32 74" stroke-width="1.3"/>
  <path d="M48 60 C46 66 44 72 40 76" stroke-width="1.3"/>
  <!-- back legs -->
  <path d="M60 60 C58 68 54 74 50 80" stroke-width="1.3"/>
  <path d="M64 58 C64 66 62 74 58 80" stroke-width="1.3"/>
</svg>
