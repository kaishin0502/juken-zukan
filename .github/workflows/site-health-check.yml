name: サイトヘルスチェック

on:
  schedule:
    # 毎日 8:00 JST (23:00 UTC 前日)
    - cron: '0 23 * * *'
    # 毎日 16:00 JST (07:00 UTC)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: サイトヘルスチェック実行
        run: node scripts/site-health-check.js

      - name: エラー時にIssue作成
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // 既存の未解決Issueがあれば作成しない
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'site-health'
            });
            if (issues.length > 0) {
              // 既存Issueにコメント追加
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `⚠️ 再度エラーが検出されました (${new Date().toLocaleString('ja-JP', {timeZone: 'Asia/Tokyo'})})\n\n[ログを確認](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ サイトヘルスチェック失敗',
              body: [
                '定期チェックでエラーが検出されました。',
                '',
                `📅 ${new Date().toLocaleString('ja-JP', {timeZone: 'Asia/Tokyo'})}`,
                `🔗 [ログを確認](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                'エラー修正後、このIssueを閉じてください。'
              ].join('\n'),
              labels: ['site-health']
            });
